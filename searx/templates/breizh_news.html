<div class="breizh-news-container">
  <h3 class="breizh-news-title">📰 Actualités de Bretagne</h3>

  {% if articles %}
  <div class="breizh-news-grid">
    {% for article in articles %}
    <a href="{{ article.url }}" target="_blank" class="breizh-news-card">
      {% if article.image %}
      <img src="{{ article.image }}" alt="Image actu" class="breizh-news-img">
      {% endif %}
      <div class="breizh-news-content">
        <strong class="breizh-news-headline">{{ article.title }}</strong><br>
        <small class="breizh-news-date">{{ article.publishedAt[:10] }}</small>
      </div>
    </a>
    {% endfor %}
  </div>
  {% else %}
    <p>Aucune actualité trouvée.</p>
  {% end
